<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 680 556.92352"
   width="680"
   height="556.92352"
   role="img"
   aria-labelledby="title desc"
   version="1.1"
   id="svg8"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <defs
     id="defs8" />
  <title
     id="title1">Square lahna (bream) fish logo</title>
  <desc
     id="desc1">A minimal monoline logo of a Finnish lahna (European bream). Square canvas, no border, no background.</desc>
  <g
     fill="none"
     stroke="currentColor"
     stroke-width="34"
     stroke-linecap="round"
     stroke-linejoin="round"
     id="g8"
     transform="translate(-143,-238.68804)">
    <!-- Body (deep-bodied bream silhouette) -->
    <ellipse
       cx="460"
       cy="512"
       rx="300"
       ry="210"
       id="ellipse1"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Tail -->
    <polyline
       points="660,442 770,360 770,664 660,582"
       id="polyline1"
       transform="translate(36)"
       style="stroke:#4c4947;stroke-opacity:1" />
    <line
       x1="696"
       y1="442"
       x2="696"
       y2="582"
       id="line1"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Dorsal fin (short, arched) -->
    <polyline
       points="360,372 420,332 480,360 520,392"
       id="polyline2"
       transform="rotate(-18.079506,176.00803,320.00012)"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Anal fin (longish on bream) -->
    <polyline
       points="420,652 520,692 600,680"
       id="polyline3"
       transform="rotate(9.887644,26.220621,685.6592)"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Pelvic/pectoral fins -->
    <polyline
       points="360,590 420,560 390,620"
       id="polyline4"
       transform="rotate(48.062954,343.62999,594.54473)"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Eye -->
    <circle
       cx="280"
       cy="500"
       r="18"
       id="circle4"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Gill plate curve -->
    <path
       d="m 332,466 q 50,46 0,92"
       id="path4"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Mouth -->
    <path
       d="m 160,512 q 30,-22 60,0 -30,22 -60,0"
       id="path5"
       style="stroke:#4c4947;stroke-opacity:1" />
    <!-- Gentle scale arcs -->
    <path
       d="m 456,480 q -30,30 0,60"
       id="path6"
       style="stroke:#4c4947;stroke-opacity:1" />
    <path
       d="m 506,470 q -30,40 0,70"
       id="path7"
       style="stroke:#4c4947;stroke-opacity:1" />
    <path
       d="m 556,470 q -30,40 0,70"
       id="path8"
       style="stroke:#4c4947;stroke-opacity:1" />
  </g>
  <metadata
     id="metadata8">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>Square lahna (bream) fish logo</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>
